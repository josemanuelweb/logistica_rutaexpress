<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acceso Conductor | Ruta Express BA</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <main class="container center-page">
    <section class="card form-card">
      <p class="eyebrow">Conductor</p>
      <h2>Acceso de sesión</h2>
      <p class="muted">Sesión: {{ usuario_email }}</p>
      <p class="muted">Selecciona tu perfil para ver tus entregas asignadas.</p>

      <form method="post" class="form-grid">
        <label>Conductor</label>
        <select name="conductor_id" class="status-select" required>
          {% for conductor in conductores %}
          <option value="{{ conductor.id }}">{{ conductor.nombre }} - {{ conductor.telefono }}</option>
          {% endfor %}
        </select>

        <button type="submit" class="btn btn-primary">Entrar</button>
      </form>

      <a class="text-link" href="/">Volver al inicio</a>
      <a class="text-link" href="/logout">Cerrar sesión</a>
    </section>
  </main>
</body>
</html>
