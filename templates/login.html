<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Ruta Express BA</title>
  <link rel="stylesheet" href="/static/style.css?v=20260314-1">
</head>
<body>
  <main class="container center-page">
    <section class="card form-card">
      <p class="eyebrow">Acceso</p>
      <h2>Iniciar sesión</h2>
      <p class="muted">Ingresa para ver el panel de envíos.</p>

      <form method="post" class="form-grid">
        <label>Email</label>
        <input name="email" type="email" placeholder="tu@email.com" required>

        <label>Contraseña</label>
        <input name="password" type="password" placeholder="••••••••" required>

        <button type="submit" class="btn btn-primary">Ingresar</button>
      </form>

      <a class="text-link" href="/">Volver al inicio</a>
    </section>
  </main>
</body>
</html>
