<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nuevo envío | Ruta Express BA</title>
  <link rel="stylesheet" href="/static/style.css?v=20260314-1">
</head>
<body>
  <main class="container center-page">
    <section class="card form-card wide">
      <div class="row-between">
        <div>
          <p class="eyebrow">Operación</p>
          <h2>Nuevo envío</h2>
          <p class="muted">Sesión: {{ usuario_email }}</p>
        </div>
        <div class="actions">
          <a class="btn btn-secondary" href="/dashboard">Ver panel</a>
          <a class="btn btn-secondary" href="/logout">Salir</a>
        </div>
      </div>

      <form method="post" class="form-grid two-cols">
        <div>
          <label>Nombre cliente</label>
          <input name="cliente" placeholder="Ej: Marta Pérez" required>
        </div>

        <div>
          <label>Teléfono</label>
          <input name="telefono" placeholder="Ej: +54 11 5555 5555" required>
        </div>

        <div class="full-col">
          <label>Dirección de entrega</label>
          <input name="direccion_entrega" placeholder="Ej: Cabildo 2000" required>
        </div>

        <div>
          <label>Fecha</label>
          <input type="date" name="fecha" value="{{ fecha_hoy }}" required>
        </div>

        <div>
          <label>Conductor asignado</label>
          <select name="conductor_id" class="status-select" required>
            {% for conductor in conductores %}
            <option value="{{ conductor.id }}">{{ conductor.nombre }}</option>
            {% endfor %}
          </select>
        </div>

        <div class="full-col">
          <button type="submit" class="btn btn-primary">Guardar envío</button>
        </div>
      </form>
    </section>
  </main>
</body>
</html>
