<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Conductores | Ruta Express BA</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <main class="container">
    <section class="card dashboard-head">
      <div>
        <p class="eyebrow">Operación</p>
        <h2>Conductores</h2>
        <p class="muted">Sesión: {{ usuario_email }}</p>
      </div>
      <div class="actions">
        <a class="btn btn-secondary" href="/dashboard">Volver al panel</a>
        <a class="btn btn-secondary" href="/logout">Salir</a>
      </div>
    </section>

    <section class="card form-card">
      <h3>Gestionar conductores</h3>
      <form method="post" action="/conductores" class="form-grid two-cols">
        <div>
          <label>Nombre</label>
          <input name="nombre" placeholder="Ej: Juan Gómez" required>
        </div>
        <div>
          <label>Teléfono</label>
          <input name="telefono" placeholder="Ej: +54 11 4444 4444">
        </div>
        <div class="full-col">
          <button type="submit" class="btn btn-primary">Guardar conductor</button>
        </div>
      </form>
    </section>

    <section class="card table-card">
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Nombre</th>
              <th>Teléfono</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody>
            {% for conductor in conductores %}
            <tr>
              <td>#{{ conductor.id }}</td>
              <td>
                <form method="post" action="/conductores/{{ conductor.id }}/editar" class="status-form">
                  <input name="nombre" value="{{ conductor.nombre }}" required>
              </td>
              <td>
                  <input name="telefono" value="{{ conductor.telefono or '' }}">
              </td>
              <td>
                  <button type="submit" class="btn btn-mini">Guardar</button>
                </form>
                <form method="post" action="/conductores/{{ conductor.id }}/eliminar" class="status-form" onsubmit="return confirm('¿Eliminar este conductor?');">
                  <button type="submit" class="btn btn-danger">Eliminar</button>
                </form>
              </td>
            </tr>
            {% endfor %}
          </tbody>
        </table>
      </div>

      {% if conductores|length == 0 %}
      <p class="empty-state">Aún no hay conductores cargados.</p>
      {% endif %}
    </section>
  </main>
</body>
</html>
